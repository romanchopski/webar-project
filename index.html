<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeautyLab Hologram</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at center, #3a2f46 0%, #1c1824 40%, #0b0b10 100%);
      overflow: hidden;
    }

    .title {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 16px;
    }

    /* Центральная зона */
    .viewer-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: transparent;
      --poster-color: transparent;
    }

    /* 🔥 Эффект "выхода из экрана" */
    .glow-floor {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse,
        rgba(255, 200, 255, 0.25) 0%,
        rgba(255, 150, 255, 0.15) 40%,
        transparent 70%
      );
      filter: blur(18px);
      z-index: 5;
    }

    /* Нижняя панель */
    .bottom-panel {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 30;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Карточка */
    .info-card {
      position: fixed;
      right: 16px;
      top: 90px;
      width: 300px;
      background: rgba(20,20,30,0.9);
      border-radius: 20px;
      padding: 18px;
      display: none;
      z-index: 40;
    }

    .info-card.show {
      display: block;
    }

    .info-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .close-btn {
      margin-top: 12px;
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      background: white;
      cursor: pointer;
    }

  </style>
</head>
<body>

<div class="title">
  BeautyLab • 3D Showcase
</div>

<div class="viewer-wrap">

  <div class="glow-floor"></div>

  <model-viewer
    id="viewer"
    src="model.glb"
    alt="Product"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="20deg"

    exposure="1.2"
    shadow-intensity="1.2"

    camera-orbit="0deg 70deg 80%"
    field-of-view="22deg">

  </model-viewer>

</div>

<div class="bottom-panel">
  <button id="resetBtn" class="btn btn-primary">Сброс</button>
  <button id="infoBtn" class="btn btn-secondary">Подробнее</button>
</div>

<div id="infoCard" class="info-card">
  <div class="info-title">О продукте</div>
  <div>Премиальная косметика нового поколения. Глубокое увлажнение и защита кожи.</div>
  <button id="closeBtn" class="close-btn">Закрыть</button>
</div>

<script>
const viewer = document.getElementById("viewer");
const infoBtn = document.getElementById("infoBtn");
const closeBtn = document.getElementById("closeBtn");
const resetBtn = document.getElementById("resetBtn");
const infoCard = document.getElementById("infoCard");

resetBtn.onclick = () => {
  viewer.cameraOrbit = "0deg 70deg 80%";
};

infoBtn.onclick = () => {
  infoCard.classList.add("show");
};

closeBtn.onclick = () => {
  infoCard.classList.remove("show");
};
</script>

</body>
</html>
