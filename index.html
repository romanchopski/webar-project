<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My First WebAR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #222;
    }

    .label {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial, sans-serif;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="label">Добро пожаловать в Demo-версию проекта AR</div>

  <model-viewer
  src="model.glb"
  alt="3D model"
  auto-rotate
  camera-controls

  ar
  ar-modes="webxr scene-viewer quick-look"
>
</model-viewer>
</body>
</html>
