<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First WebAR</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #222;
    }

    .label {
      position: fixed;
      top: 16px;
      left: 16px;
      color: white;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 10px;
    }

    .ar-button {
      background: white;
      border-radius: 999px;
      border: none;
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="label">Добро пожаловать в Demo-версию проекта AR</div>

  <model-viewer
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    alt="A 3D model of an astronaut"
    ar
    ar-modes="webxr scene-viewer quick-look"
    auto-rotate
    camera-controls>
    <button slot="ar-button" class="ar-button">Открыть в AR</button>
  </model-viewer>
</body>
</html>
