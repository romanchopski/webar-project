<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Demo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #1f1f1f, #0f0f0f);
    }

    .title {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 16px;
    }

    .ar-button-fixed {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 1000;

      background: white;
      color: black;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="title">Demo AR проекта</div>

  <model-viewer
  id="arModel"
  src="model.glb"
  alt="3D model"
  ar
  ar-modes="webxr scene-viewer quick-look"
  auto-rotate
  camera-controls>
</model-viewer>

  <button id="openArBtn" class="ar-button-fixed">
    Открыть в AR
  </button>

  <script>
    const modelViewer = document.getElementById('arModel');
    const openArBtn = document.getElementById('openArBtn');

    openArBtn.addEventListener('click', async () => {
      try {
        await modelViewer.activateAR();
      } catch (error) {
        console.error('AR launch failed:', error);
        alert('Не удалось открыть AR на этом устройстве или в этом режиме.');
      }
    });
  </script>

</body>
</html>
