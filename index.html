<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Debug</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    model-viewer {
      width: 100vw;
      height: 75vh;
      background: #222;
    }

    .panel {
      padding: 12px;
      line-height: 1.5;
      background: #1a1a1a;
      font-size: 15px;
    }

    .ar-button {
      background: white;
      color: black;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 16px;
      position: absolute;
      bottom: 16px;
      right: 16px;
    }
  </style>
</head>
<body>
  <model-viewer
    id="mv"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    alt="Astronaut"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate>
    <button slot="ar-button" class="ar-button">Открыть в AR</button>
  </model-viewer>

  <div class="panel">
    <div>AR status: <span id="arStatus">waiting...</span></div>
    <div>Current URL: <span id="urlText"></span></div>
    <div>User agent: <span id="uaText"></span></div>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const arStatus = document.getElementById('arStatus');
    const urlText = document.getElementById('urlText');
    const uaText = document.getElementById('uaText');

    urlText.textContent = window.location.href;
    uaText.textContent = navigator.userAgent;

    mv.addEventListener('load', () => {
      arStatus.textContent = 'model loaded';
    });

    mv.addEventListener('ar-status', (event) => {
      arStatus.textContent = event.detail.status;
    });

    mv.addEventListener('error', (event) => {
      arStatus.textContent = 'error';
      console.log(event);
    });
  </script>
</body>
</html>
